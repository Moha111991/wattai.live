# MQTT Access Control List (ACL)
# Definiert, welche Benutzer auf welche Topics zugreifen dürfen

# =============================================================================
# Admin-Benutzer (voller Zugriff)
# =============================================================================
user admin
topic readwrite #

# =============================================================================
# EMS-System (Energiemanagementsystem)
# =============================================================================
user ems_backend
topic readwrite ems/#
topic readwrite control/#

# =============================================================================
# E-Auto (schreibt SOC, liest Steuerungsbefehle)
# =============================================================================
user ev_device
topic write ems/ev/soc
topic write ems/ev/charging_power
topic write ems/ev/range
topic read control/ev/#

# =============================================================================
# Heimspeicher (schreibt SOC, liest Steuerungsbefehle)
# =============================================================================
user battery_device
topic write ems/home_battery/soc
topic write ems/home_battery/power
topic write ems/home_battery/voltage
topic read control/battery/#

# =============================================================================
# Wallbox (schreibt Ladeleistung, liest Steuerungsbefehle)
# =============================================================================
user wallbox_device
topic write ems/wallbox/power
topic write ems/wallbox/current
topic write ems/wallbox/status
topic read control/wallbox/#

# =============================================================================
# PV-Anlage (schreibt Erzeugungsdaten)
# =============================================================================
user pv_device
topic write ems/pv/power
topic write ems/pv/voltage
topic write ems/pv/current

# =============================================================================
# Wärmepumpe (schreibt Verbrauch, liest Steuerung)
# =============================================================================
user heatpump_device
topic write ems/heatpump/power
topic write ems/heatpump/cop
topic write ems/heatpump/status
topic read control/heatpump/#

# =============================================================================
# Mobile App / Dashboard (nur Lesen + Steuerung)
# =============================================================================
user mobile_app
topic read ems/#
topic write control/#

# =============================================================================
# Pattern-basierte Regeln
# =============================================================================
# Jeder Benutzer kann seinen eigenen Status schreiben
pattern write ems/%u/status
pattern read ems/%u/status
