# Mosquitto MQTT Broker Konfiguration
# Produktionssicheres Setup mit Authentifizierung und TLS

# =============================================================================
# Netzwerk-Einstellungen
# =============================================================================

# Standard MQTT Port (unverschlüsselt - nur für lokale Tests)
listener 1883 0.0.0.0
protocol mqtt

# Sicherer MQTT Port mit TLS (Produktion)
listener 8883 0.0.0.0
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2

# WebSocket Port (für Browser/Mobile Apps)
listener 9001 0.0.0.0
protocol websockets

# Sicherer WebSocket Port mit TLS
listener 9002 0.0.0.0
protocol websockets
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2

# =============================================================================
# Authentifizierung
# =============================================================================

# Passwort-basierte Authentifizierung aktivieren
allow_anonymous false
password_file /mosquitto/config/passwords.txt

# =============================================================================
# Zugriffsrechte (ACL - Access Control List)
# =============================================================================

# ACL aktivieren für feinere Berechtigungen
acl_file /mosquitto/config/acl.conf

# =============================================================================
# Persistenz und Logging
# =============================================================================

# Nachrichtenpersistenz aktivieren
persistence true
persistence_location /mosquitto/data/
autosave_interval 300

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# =============================================================================
# Performance-Einstellungen
# =============================================================================

# Maximale Anzahl gleichzeitiger Verbindungen
max_connections -1

# Queue-Einstellungen für QoS
max_queued_messages 1000
max_inflight_messages 20

# Verbindungs-Timeouts
keepalive_interval 60

# =============================================================================
# Sicherheits-Einstellungen
# =============================================================================

# Maximale Paketgröße (16 MB)
message_size_limit 16777216

# Verbindungsrate begrenzen (DoS-Schutz)
max_connections 100
