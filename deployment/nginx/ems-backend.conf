# ==========================================
# EMS Backend - Nginx Reverse Proxy
# HTTPS/TLS Configuration
# ==========================================
#
# Installation:
# 1. sudo cp ems-backend.conf /etc/nginx/sites-available/
# 2. sudo ln -s /etc/nginx/sites-available/ems-backend.conf /etc/nginx/sites-enabled/
# 3. sudo certbot --nginx -d ems.yourdomain.com
# 4. sudo nginx -t
# 5. sudo systemctl restart nginx

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name ems.yourdomain.com;
    
    # Let's Encrypt ACME Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ems.yourdomain.com;
    
    # ==========================================
    # SSL/TLS Configuration
    # ==========================================
    
    # Let's Encrypt Certificates
    ssl_certificate /etc/letsencrypt/live/ems.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ems.yourdomain.com/privkey.pem;
    
    # TLS 1.3 Only (höchste Sicherheit)
    ssl_protocols TLSv1.3;
    
    # Cipher Suites (TLS 1.3)
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256';
    ssl_prefer_server_ciphers on;
    
    # SSL Session Cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/ems.yourdomain.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # ==========================================
    # Security Headers
    # ==========================================
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Prevent Clickjacking
    add_header X-Frame-Options "DENY" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Prevent MIME-Type Sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # CSP (Content Security Policy)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://ems.yourdomain.com;" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # ==========================================
    # Logging
    # ==========================================
    
    access_log /var/log/nginx/ems-backend-access.log;
    error_log /var/log/nginx/ems-backend-error.log warn;
    
    # ==========================================
    # FastAPI Backend (Port 8001)
    # ==========================================
    
    location / {
    proxy_pass HTTPS://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer Settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # ==========================================
    # WebSocket (Port 8001/ws)
    # ==========================================
    
    location /ws {
    proxy_pass https://localhost:8001/ws;
        proxy_http_version 1.1;
        
        # WebSocket Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket Timeouts (längere Timeouts für persistente Verbindungen)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Disable Buffering für WebSocket
        proxy_buffering off;
    }
    
    # ==========================================
    # API Documentation (FastAPI Swagger/ReDoc)
    # ==========================================
    
    location /docs {
    proxy_pass https://localhost:8001/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /redoc {
    proxy_pass https://localhost:8001/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /openapi.json {
    proxy_pass https://localhost:8001/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ==========================================
    # Rate Limiting (zusätzlich zu FastAPI)
    # ==========================================
    
    # Limit Requests pro IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req zone=api_limit burst=20 nodelay;
    
    # ==========================================
    # Compression
    # ==========================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
}

# ==========================================
# Additional Security: Block Common Exploits
# ==========================================

# Block access to hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Block access to backup files
location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
}
