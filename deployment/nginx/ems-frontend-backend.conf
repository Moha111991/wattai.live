# ============================================================
# WattAI.live — Nginx Production Config (DSGVO + BSI-konform)
# ============================================================

# Rate-Limiting Zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ws_limit:10m  rate=10r/m;
limit_req_zone $binary_remote_addr zone=general:10m   rate=60r/m;

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name wattai.live www.wattai.live;
    return 301 https://$host$request_uri;
}

# HTTPS Hauptserver
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wattai.live www.wattai.live;

    # TLS — Zertifikate (Let's Encrypt / eigene CA)
    ssl_certificate     /etc/ssl/certs/wattai.live.crt;
    ssl_certificate_key /etc/ssl/private/wattai.live.key;

    # Nur sichere TLS-Versionen
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — 2 Jahre, Preload-ready (BSI-Empfehlung)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers (DSGVO / BSI Grundschutz)
    add_header X-Content-Type-Options        "nosniff"                         always;
    add_header X-Frame-Options               "DENY"                            always;
    add_header X-XSS-Protection             "1; mode=block"                   always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://wattai.live; connect-src 'self' wss://wattai.live https://wattai.live https://cloud.umami.is; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://buy.stripe.com;"
        always;

    # Server-Version verbergen (keine Fingerprinting-Info)
    server_tokens off;

    # Max. Upload-Größe (verhindert DoS via riesige Requests)
    client_max_body_size 10m;
    client_body_timeout  12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # Frontend (React/Vite Build)
    root /app/frontend/dist;
    index index.html;

    # Statische Assets — lange Cache-Zeit (Vite-Hashes garantieren Freshness)
    location ~* \.(js|css|png|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA Fallback
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # API-Proxy mit Rate-Limiting
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        # Keine sensibler Daten im Cache
        add_header Cache-Control "no-store, no-cache" always;
    }

    # Device-Ingest Endpunkt
    location /devices {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        add_header Cache-Control "no-store" always;
    }

    # WebSocket — für Echtzeit-Dashboard
    location /ws {
        limit_req zone=ws_limit burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8001/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Health-Check (kein Auth nötig)
    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        access_log off;
    }

    # Sensible Pfade sperren
    location ~ /\.(git|env|htaccess|DS_Store) {
        deny all;
        return 404;
    }
    location ~ \.(yaml|yml|toml|json|log|bak|sql)$ {
        deny all;
        return 404;
    }
}
