services:
  - type: web
    name: loopiq-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: npm --prefix frontend ci && npm --prefix frontend run build && pip install -r backend/requirements.deploy.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOW_INSECURE
        value: "true"
      - key: API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
