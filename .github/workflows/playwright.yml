name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manueller Start möglich

jobs:
  test:
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: 📦 Install Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: 🔍 Get Playwright Version
      id: playwright-version
      working-directory: ./frontend
      run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

    - name: 💾 Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: 📦 Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: ✅ Run Playwright Tests
      working-directory: ./frontend
      run: npx playwright test
      continue-on-error: true
      env:
        CI: true

    - name: 📊 Upload Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

    - name: 📸 Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: frontend/test-results/
        retention-days: 7

    - name: 💬 Comment PR with Results
      uses: daun/playwright-report-comment@v3
      if: github.event_name == 'pull_request' && hashFiles('frontend/test-results/results.json') != ''
      with:
        report-file: frontend/test-results/results.json
        comment-title: Playwright test results
        job-summary: false
        icon-style: octicons
