name: 🚀 Deploy to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'Dockerfile'
      - 'railway.toml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Railway via REST API
        run: |
          curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceRedeploy(environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\", serviceId: \\\"${{ secrets.RAILWAY_SERVICE_ID }}\\\") }\"}" \
            | tee /tmp/railway_response.json
          if grep -q '"errors"' /tmp/railway_response.json; then
            echo "❌ Railway deploy failed:"
            cat /tmp/railway_response.json
            exit 1
          fi
          echo "✅ Redeploy ausgelöst"

      - name: ✅ Deployment erfolgreich
        run: |
          echo "============================================"
          echo "✅ Railway Redeploy wurde ausgelöst!"
          echo "🌐 https://www.wattai.live"
          echo "⏳ Build läuft auf Railway (ca. 2-3 min)"
          echo "============================================"
