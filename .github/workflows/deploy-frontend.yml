name: 🚀 Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli@latest
          railway up --detach --service "wattai.live"

      - name: ✅ Deployment erfolgreich
        run: |
          echo "============================================"
          echo "✅ Service wurde erfolgreich deployed!"
          echo "🌐 https://www.wattai.live"
          echo "============================================"
