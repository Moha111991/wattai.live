name: 🚀 Deploy to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'Dockerfile'
      - 'railway.toml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Railway via Deploy Hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}")
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "202" ]; then
            echo "❌ Deploy Hook failed with status $RESPONSE"
            exit 1
          fi
          echo "✅ Deploy Hook triggered successfully"

      - name: ✅ Deployment erfolgreich
        run: |
          echo "============================================"
          echo "✅ Deploy wurde ausgelöst!"
          echo "🌐 https://www.wattai.live"
          echo "⏳ Build läuft auf Railway (ca. 2-3 min)"
          echo "============================================"
