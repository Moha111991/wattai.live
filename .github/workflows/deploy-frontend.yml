name: 🚀 Deploy Frontend → www.wattai.live

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🏗️ Build Frontend (Production)
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://www.wattai.live
          VITE_WS_URL: wss://www.wattai.live/ws
          NODE_ENV: production

      - name: 📊 Show Build Size
        run: |
          echo "=== Frontend Build Größe ==="
          du -sh frontend/dist/
          echo ""
          echo "=== Dateien ==="
          find frontend/dist -type f | sort

      - name: 🚀 Deploy to Railway
        working-directory: ./frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --detach

      - name: ✅ Deployment erfolgreich
        run: |
          echo "============================================"
          echo "✅ Frontend wurde erfolgreich deployed!"
          echo "🌐 https://www.wattai.live"
          echo "⚡ Backend API: https://api.wattai.live"
          echo "============================================"
