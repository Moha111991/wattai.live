name: 🚀 Deploy Frontend → www.wattai.live

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'       # Nur wenn Frontend-Dateien geändert wurden
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:        # Manueller Start jederzeit möglich

jobs:
  build-and-deploy:
    name: Build & Deploy to IONOS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Code holen ───────────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── 2. Node.js einrichten ───────────────────────────────
      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Abhängigkeiten installieren ──────────────────────
      - name: 📦 Install Dependencies
        working-directory: ./frontend
        run: npm ci

      # ── 4. Production Build erstellen ───────────────────────
      - name: 🏗️ Build Frontend (Production)
        working-directory: ./frontend
        run: npm run build
        env:
          # Produktions-API-URL → Railway Backend
          VITE_API_URL: https://api.wattai.live
          VITE_WS_URL: wss://api.wattai.live/ws
          NODE_ENV: production

      # ── 5. Build-Größe anzeigen ─────────────────────────────
      - name: 📊 Show Build Size
        run: |
          echo "=== Frontend Build Größe ==="
          du -sh frontend/dist/
          echo ""
          echo "=== Dateien ==="
          find frontend/dist -type f | sort

      # ── 6. Auf united-domains deployen via SFTP ─────────────
      - name: 🚀 Deploy via SFTP to united-domains (www.wattai.live)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "frontend/dist/*"
          target: ${{ secrets.SFTP_SERVER_DIR }}
          strip_components: 2   # entfernt "frontend/dist/" vom Pfad

      # ── 7. Deployment bestätigen ────────────────────────────
      - name: ✅ Deployment erfolgreich
        run: |
          echo "============================================"
          echo "✅ Frontend wurde erfolgreich deployed!"
          echo "🌐 https://www.wattai.live"
          echo "⚡ Backend API: https://api.wattai.live"
          echo "============================================"
