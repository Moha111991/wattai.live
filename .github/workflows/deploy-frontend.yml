name: 🚀 Deploy Frontend → www.wattai.live

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to united-domains
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🏗️ Build Frontend (Production)
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.wattai.live
          VITE_WS_URL: wss://api.wattai.live/ws
          NODE_ENV: production

      - name: 📊 Show Build Size
        run: |
          echo "=== Frontend Build Größe ==="
          du -sh frontend/dist/
          echo ""
          echo "=== Dateien ==="
          find frontend/dist -type f | sort

      - name: 📦 Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: 🚀 Deploy via SFTP to united-domains
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_DIR: ${{ secrets.SFTP_DIR }}
        run: |
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" sftp://$SFTP_SERVER:$SFTP_PORT <<EOF
          set cmd:fail-exit yes
          set sftp:auto-confirm yes
          mirror -R --delete --verbose frontend/dist/ "$SFTP_DIR"
          bye
          EOF

      - name: ✅ Deployment erfolgreich
        run: |
          echo "============================================"
          echo "✅ Frontend wurde erfolgreich deployed!"
          echo "🌐 https://www.wattai.live"
          echo "⚡ Backend API: https://api.wattai.live"
          echo "============================================"
