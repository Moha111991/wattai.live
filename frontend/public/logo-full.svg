<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient Definitions -->
    <linearGradient id="wattai-gradient-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="wattai-gradient-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="wattai-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Icon/Symbol -->
  <g transform="translate(0, 36)">
    <!-- Outer Circle - Neural Network Ring -->
    <circle cx="24" cy="24" r="20" fill="none" stroke="url(#wattai-gradient-main)" stroke-width="3" opacity="0.6"/>

    <!-- Neural Network Nodes -->
    <g opacity="0.8">
      <circle cx="24" cy="4" r="3" fill="url(#wattai-gradient-main)"/>
      <circle cx="41" cy="12" r="3" fill="url(#wattai-gradient-main)"/>
      <circle cx="41" cy="36" r="3" fill="url(#wattai-gradient-main)"/>
      <circle cx="24" cy="44" r="3" fill="url(#wattai-gradient-main)"/>
      <circle cx="7" cy="36" r="3" fill="url(#wattai-gradient-main)"/>
      <circle cx="7" cy="12" r="3" fill="url(#wattai-gradient-main)"/>
    </g>

    <!-- Connection Lines -->
    <g opacity="0.3" stroke="url(#wattai-gradient-main)" stroke-width="1">
      <line x1="24" y1="4" x2="41" y2="36"/>
      <line x1="41" y1="36" x2="7" y2="36"/>
      <line x1="7" y1="36" x2="24" y2="4"/>
    </g>

    <!-- Center Lightning Bolt -->
    <path d="M 24,6 L 16,24 L 24,24 L 24,42 L 32,24 L 24,24 Z" 
          fill="url(#wattai-gradient-accent)" 
          filter="url(#wattai-glow)"/>

    <!-- AI Brain Circuit Pattern -->
    <g opacity="0.4">
      <path d="M 14 -1 Q 24 -6 34 -1" fill="none" stroke="url(#wattai-gradient-main)" stroke-width="1.5"/>
      <path d="M 14 49 Q 24 54 34 49" fill="none" stroke="url(#wattai-gradient-main)" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Text - WattAI.live -->
  <g transform="translate(63, 60)">
    <text x="0" y="0" 
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif" 
          font-size="36" 
          font-weight="800" 
          fill="url(#wattai-gradient-main)" 
          dominant-baseline="middle">
      Watt<tspan fill="url(#wattai-gradient-accent)" font-weight="900" filter="url(#wattai-glow)">AI</tspan><tspan fill="#94a3b8" font-weight="500" font-size="30.6">.live</tspan>
    </text>
  </g>
</svg>
